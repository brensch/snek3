<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>snek3 · training dashboard</title>
<style>
  :root { --bg:#0e1116; --panel:#161b22; --line:#30363d; --fg:#e6edf3; --muted:#8b949e; --accent:#3b82f6; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.4 ui-sans-serif,system-ui,Segoe UI,Roboto,Helvetica,Arial; }
  header { display:flex; align-items:center; gap:16px; padding:12px 18px; border-bottom:1px solid var(--line); background:var(--panel); position:sticky; top:0; z-index:2; flex-wrap:wrap; }
  header h1 { font-size:16px; margin:0; font-weight:650; letter-spacing:.3px; }
  header h1 .dot { color:var(--accent); }
  .grow { flex:1; }
  select, button { background:#0d1117; color:var(--fg); border:1px solid var(--line); border-radius:6px; padding:6px 9px; font-size:13px; }
  button { cursor:pointer; }
  button:hover { border-color:var(--accent); }
  .pill { padding:3px 9px; border-radius:999px; border:1px solid var(--line); font-size:12px; color:var(--muted); }
  .pill.live { color:#34d399; border-color:#10532f; }
  .pill.done { color:var(--muted); }
  main { display:grid; grid-template-columns: 1fr 470px; gap:16px; padding:16px; align-items:start; }
  @media (max-width: 1000px){ main{ grid-template-columns:1fr; } }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px; }
  .card h2 { margin:0 0 10px; font-size:13px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.6px; }
  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px 18px; margin-bottom:10px; }
  .stat b { display:block; font-size:19px; }
  .stat span { color:var(--muted); font-size:11px; }
  canvas { display:block; background:#0b0e13; border-radius:8px; }
  .controls { display:flex; align-items:center; gap:10px; margin-top:10px; flex-wrap:wrap; }
  .controls input[type=range]{ accent-color:var(--accent); }
  #scrub { flex:1; min-width:140px; }
  .legend { display:flex; gap:14px; flex-wrap:wrap; margin-top:10px; font-size:12px; color:var(--muted); }
  .swatch { display:inline-block; width:10px; height:10px; border-radius:3px; vertical-align:middle; margin-right:5px; }
  .muted { color:var(--muted); }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:10px; }
  label.chk { color:var(--muted); font-size:12px; display:flex; align-items:center; gap:5px; }
  .badge { font-size:12px; padding:2px 8px; border-radius:6px; border:1px solid var(--line); }
  .badge.win { color:#34d399; border-color:#10532f; } .badge.loss { color:#f87171; } .badge.draw { color:#fbbf24; }
</style>
</head>
<body>
<header>
  <h1>snek3<span class="dot">·</span>training</h1>
  <select id="runSel" title="run"></select>
  <span id="statusPill" class="pill">—</span>
  <div class="grow"></div>
  <span id="metaPill" class="pill">—</span>
</header>

<main>
  <section class="card" id="metricsCard">
    <h2>Training metrics</h2>
    <div class="stats" id="statsRow"></div>
    <canvas id="chart" width="900" height="300"></canvas>
    <div class="legend">
      <span><i class="swatch" style="background:#34d399"></i>win-rate vs baseline (0–1)</span>
      <span><i class="swatch" style="background:#f59e0b"></i>policy loss</span>
      <span><i class="swatch" style="background:#60a5fa"></i>value loss</span>
    </div>
  </section>

  <section class="card" id="gameCard">
    <h2>Live game stream</h2>
    <div class="row">
      <span id="gameTitle" class="muted">waiting for games…</span>
      <span id="gameResult" class="badge">—</span>
      <div class="grow"></div>
      <span id="streamCount" class="muted"></span>
    </div>
    <canvas id="board" width="448" height="448"></canvas>
    <div class="controls">
      <button id="playBtn">⏸ Pause</button>
      <button id="stepBack" title="prev frame">⟨</button>
      <button id="stepFwd" title="next frame">⟩</button>
      <button id="skipBtn" title="next game">⏭</button>
      <input type="range" id="scrub" min="0" max="0" value="0" />
      <span id="frameLbl" class="muted">—</span>
    </div>
    <div class="controls">
      <label class="chk"><input type="checkbox" id="followLatest" checked> stream newest</label>
      <label class="chk">speed <input type="range" id="speed" min="2" max="30" value="12" title="frames/sec"></label>
      <span id="speedLbl" class="muted">12 fps</span>
      <div class="grow"></div>
      <select id="genSel" title="jump to generation"></select>
      <select id="gameSel" title="game in generation"></select>
    </div>
  </section>
</main>

<script>
const COLORS = ['#3b82f6','#22c55e','#f59e0b','#ec4899','#a78bfa','#f87171','#2dd4bf','#facc15'];
const state = {
  run:null, metrics:[], filesIndex:[],
  allGames:[],            // flattened, newest-first: {file, gen, idx, meta, key}
  shown:new Set(),        // keys already streamed
  fileCache:new Map(),    // file -> full json
  cur:null,               // {key, gen, opponent, winner, frames}
  frame:0, fps:12, playing:true, timer:null, streamedCount:0,
};

async function getJSON(url){ const r = await fetch(url); if(!r.ok) throw new Error(url+' '+r.status); return r.json(); }

// ---------- runs / status / metrics ----------
async function loadRuns(){
  const { runs } = await getJSON('/api/runs');
  const sel = document.getElementById('runSel');
  sel.innerHTML = runs.map(r=>`<option>${r}</option>`).join('') || '<option>(no runs)</option>';
  if(!state.run || !runs.includes(state.run)) state.run = runs[0] || null;
  sel.value = state.run || '';
}

async function refresh(){
  await loadRuns();
  if(!state.run) return;
  const [status, metrics, meta] = await Promise.all([
    getJSON(`/api/runs/${state.run}/status`).catch(()=>({})),
    getJSON(`/api/runs/${state.run}/metrics`).catch(()=>({metrics:[]})),
    getJSON(`/api/runs/${state.run}/meta`).catch(()=>({})),
  ]);
  state.metrics = metrics.metrics || [];
  renderStatus(status, meta); renderStats(status); drawChart();
  await updateGamesIndex();
}

function renderStatus(status, meta){
  const pill = document.getElementById('statusPill');
  const gen = status.generation, total = status.total_generations, running = status.running;
  pill.className = 'pill ' + (running ? 'live' : 'done');
  pill.textContent = (gen==null) ? 'no data' : `${running?'● live':'■ done'} · gen ${gen+1}/${total??'?'}`;
  document.getElementById('metaPill').textContent =
    meta.board ? `${meta.board}×${meta.board} · ${meta.filters}f/${meta.blocks}b · depth ${meta.depth} · ${meta.device||''}` : '—';
}

function renderStats(status){
  const m = (status && status.last) || {};
  const best = status && status.best_win_rate;
  const stat = (b,s)=>`<div class="stat"><b>${b}</b><span>${s}</span></div>`;
  document.getElementById('statsRow').innerHTML =
    stat(m.gen!=null?m.gen:'—','generation') +
    stat(m.win_rate!=null?m.win_rate.toFixed(3):'—','win-rate (best '+(best!=null?best.toFixed(2):'—')+')') +
    stat(m.turns_per_sec!=null?Math.round(m.turns_per_sec).toLocaleString():'—','turns / sec') +
    stat(m.games_per_sec!=null?m.games_per_sec.toFixed(1):'—','games / sec') +
    stat(m.policy_loss!=null?m.policy_loss.toFixed(3):'—','policy loss') +
    stat(m.value_loss!=null?m.value_loss.toFixed(3):'—','value loss') +
    stat(m.samples!=null?m.samples.toLocaleString():'—','samples/gen') +
    stat(state.streamedCount.toLocaleString(),'games streamed');
}

// ---------- metrics chart ----------
function drawChart(){
  const c=document.getElementById('chart'), ctx=c.getContext('2d');
  const W=c.width,H=c.height,padL=42,padR=12,padT=14,padB=24; ctx.clearRect(0,0,W,H);
  const M=state.metrics;
  if(!M.length){ ctx.fillStyle='#8b949e'; ctx.fillText('no metrics yet', padL, H/2); return; }
  const gens=M.map(m=>m.gen), gmin=Math.min(...gens), gmax=Math.max(...gens, gmin+1);
  const x=g=>padL+(W-padL-padR)*(g-gmin)/((gmax-gmin)||1);
  ctx.strokeStyle='#21262d'; ctx.fillStyle='#8b949e'; ctx.lineWidth=1; ctx.font='11px ui-sans-serif';
  for(let i=0;i<=4;i++){ const yy=padT+(H-padT-padB)*i/4; ctx.beginPath(); ctx.moveTo(padL,yy); ctx.lineTo(W-padR,yy); ctx.stroke(); ctx.fillText((1-i/4).toFixed(2),6,yy+3); }
  const losses=M.flatMap(m=>[m.policy_loss,m.value_loss]).filter(v=>v!=null), lmax=Math.max(0.001,...losses);
  const yU=v=>padT+(H-padT-padB)*(1-v), yL=v=>padT+(H-padT-padB)*(1-v/lmax);
  const line=(pts,color,dash)=>{ if(!pts.length)return; ctx.strokeStyle=color; ctx.lineWidth=2; ctx.setLineDash(dash?[4,4]:[]);
    ctx.beginPath(); pts.forEach((p,i)=>i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1])); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle=color; pts.forEach(p=>{ctx.beginPath();ctx.arc(p[0],p[1],2.4,0,7);ctx.fill();}); };
  line(M.filter(m=>m.policy_loss!=null).map(m=>[x(m.gen),yL(m.policy_loss)]),'#f59e0b',true);
  line(M.filter(m=>m.value_loss!=null).map(m=>[x(m.gen),yL(m.value_loss)]),'#60a5fa',true);
  line(M.filter(m=>m.win_rate!=null).map(m=>[x(m.gen),yU(m.win_rate)]),'#34d399',false);
  ctx.fillStyle='#8b949e'; ctx.fillText('gen '+gmin,padL,H-7); ctx.fillText('gen '+gmax,W-padR-44,H-7);
}

// ---------- game stream ----------
async function updateGamesIndex(){
  const { files } = await getJSON(`/api/runs/${state.run}/games`).catch(()=>({files:[]}));
  state.filesIndex = files;  // newest-first from server
  // Flatten newest-first; assign stable keys.
  state.allGames = [];
  for(const f of files)
    (f.games||[]).forEach((g,i)=> state.allGames.push({file:f.file, gen:f.gen, idx:i, meta:g, key:f.file+'#'+i}));
  // Manual browse dropdown (generations).
  const genSel=document.getElementById('genSel'), prev=genSel.value;
  genSel.innerHTML = files.map(f=>`<option value="${f.file}">gen ${f.gen}</option>`).join('') || '<option>(no games)</option>';
  if(files.some(f=>f.file===prev)) genSel.value=prev;
  // Kick the stream if idle.
  if(state.followLatest!==false && (!state.cur || !state.playing)) maybeStreamNext();
  if(!state.cur) maybeStreamNext();
}

async function fetchFile(file){
  if(state.fileCache.has(file)) return state.fileCache.get(file);
  const data = await getJSON(`/api/runs/${state.run}/games/${file}`);
  state.fileCache.set(file, data);
  if(state.fileCache.size>60){ const k=state.fileCache.keys().next().value; state.fileCache.delete(k); }
  return data;
}

function nextStreamRef(){
  // Newest unshown game; if all shown, the newest overall (replay to stay in motion).
  for(const g of state.allGames) if(!state.shown.has(g.key)) return g;
  return state.allGames[0] || null;
}

async function loadRef(ref, markShown){
  const data = await fetchFile(ref.file);
  const g = data.games[ref.idx];
  if(!g) return;
  if(markShown && !state.shown.has(ref.key)){ state.shown.add(ref.key); state.streamedCount++; }
  state.cur = {key:ref.key, gen:ref.gen, opponent:g.opponent, winner:g.winner, frames:g.frames};
  state.frame = 0;
  const scrub=document.getElementById('scrub'); scrub.max=Math.max(0,g.frames.length-1); scrub.value=0;
  document.getElementById('gameTitle').textContent = `gen ${ref.gen} · ${g.opponent==='net'?'self-play':'vs baseline'} · ${g.frames.length} turns`;
  const res = g.winner===0?['WIN','win']:(g.winner===1?['loss','loss']:(g.winner===-1?['draw','draw']:['—','']));
  const rb=document.getElementById('gameResult'); rb.textContent=res[0]; rb.className='badge '+res[1];
  drawBoard();
}

async function maybeStreamNext(){
  const ref = nextStreamRef();
  if(ref) await loadRef(ref, true);
}

function drawBoard(){
  const c=document.getElementById('board'), ctx=c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  const fr = state.cur && state.cur.frames[state.frame];
  if(!fr){ ctx.fillStyle='#8b949e'; ctx.fillText('waiting for games…',20,30); return; }
  const W=fr.width,H=fr.height, cell=Math.floor(Math.min(c.width,c.height)/Math.max(W,H));
  const px=x=>x*cell, py=y=>(H-1-y)*cell;
  ctx.fillStyle='#0b0e13'; ctx.fillRect(0,0,W*cell,H*cell);
  ctx.strokeStyle='#161b22'; ctx.lineWidth=1;
  for(let i=0;i<=W;i++){ctx.beginPath();ctx.moveTo(i*cell,0);ctx.lineTo(i*cell,H*cell);ctx.stroke();}
  for(let j=0;j<=H;j++){ctx.beginPath();ctx.moveTo(0,j*cell);ctx.lineTo(W*cell,j*cell);ctx.stroke();}
  (fr.food||[]).forEach(([x,y])=>{ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(px(x)+cell/2,py(y)+cell/2,cell*0.22,0,7);ctx.fill();});
  (fr.hazards||[]).forEach(([x,y])=>{ctx.fillStyle='rgba(234,179,8,0.12)';ctx.fillRect(px(x),py(y),cell,cell);});
  fr.snakes.forEach((s,si)=>{
    const col=COLORS[si%COLORS.length]; ctx.globalAlpha=s.alive?1:0.22;
    s.body.forEach(([x,y],bi)=>{ ctx.fillStyle=col; const pad=cell*0.12;
      roundRect(ctx,px(x)+pad,py(y)+pad,cell-2*pad,cell-2*pad,cell*0.2); ctx.fill();
      if(bi===0){ ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.beginPath(); ctx.arc(px(x)+cell/2,py(y)+cell/2,cell*0.13,0,7); ctx.fill(); } });
    ctx.globalAlpha=1;
  });
  document.getElementById('frameLbl').textContent =
    `turn ${fr.turn} · ${state.frame+1}/${state.cur.frames.length}  ` +
    fr.snakes.map((s,i)=>`S${i}:${s.alive?('hp'+s.health):'✕'}`).join('  ');
}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

function setFrame(i){ if(!state.cur)return; state.frame=Math.max(0,Math.min(state.cur.frames.length-1,i));
  document.getElementById('scrub').value=state.frame; drawBoard(); }

function tick(){
  if(!state.playing || !state.cur) return;
  if(state.frame >= state.cur.frames.length-1){
    // End of game: advance the stream, or replay if manual/caught up.
    if(state.followLatest!==false) maybeStreamNext();
    else setFrame(0);
  } else setFrame(state.frame+1);
}
function restartTimer(){ clearInterval(state.timer); state.timer=setInterval(tick, 1000/state.fps); }

// ---------- wiring ----------
state.followLatest = true;
document.getElementById('runSel').addEventListener('change', e=>{ state.run=e.target.value; state.cur=null; state.shown.clear(); state.fileCache.clear(); refresh(); });
document.getElementById('playBtn').addEventListener('click', ()=>{ state.playing=!state.playing; document.getElementById('playBtn').textContent=state.playing?'⏸ Pause':'▶ Play'; });
document.getElementById('stepFwd').addEventListener('click', ()=>setFrame(state.frame+1));
document.getElementById('stepBack').addEventListener('click', ()=>setFrame(state.frame-1));
document.getElementById('skipBtn').addEventListener('click', ()=>maybeStreamNext());
document.getElementById('scrub').addEventListener('input', e=>setFrame(+e.target.value));
document.getElementById('followLatest').addEventListener('change', e=>{ state.followLatest=e.target.checked; if(e.target.checked) maybeStreamNext(); });
document.getElementById('speed').addEventListener('input', e=>{ state.fps=+e.target.value; document.getElementById('speedLbl').textContent=state.fps+' fps'; restartTimer(); });
document.getElementById('genSel').addEventListener('change', async e=>{
  state.followLatest=false; document.getElementById('followLatest').checked=false;
  const data=await fetchFile(e.target.value);
  const gameSel=document.getElementById('gameSel');
  gameSel.innerHTML=data.games.map((g,i)=>{ const r=g.winner===0?'WIN':(g.winner===1?'loss':'draw'); return `<option value="${i}">${g.opponent} · ${r} · ${g.num_turns}t</option>`;}).join('');
  gameSel.value='0';
  loadRef({file:e.target.value, gen:data.gen, idx:0, key:e.target.value+'#0'}, false);
});
document.getElementById('gameSel').addEventListener('change', e=>{
  const file=document.getElementById('genSel').value;
  loadRef({file, gen:null, idx:+e.target.value, key:file+'#'+e.target.value}, false);
});

refresh().then(restartTimer);
setInterval(()=>{ refresh().catch(()=>{}); }, 2500);
