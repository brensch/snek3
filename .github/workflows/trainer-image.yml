name: trainer-image

# Builds the CUDA trainer image (snek-train + dashboard frontend + tailscale
# tunnel) and pushes it to GHCR so RunPod or any GPU box can pull-and-run
# with no per-boot build. Everything — frontend build, libtorch install,
# cargo build — happens inside deploy/trainer.Dockerfile.
#
# Runs when a version tag (v*) is pushed; the image is tagged with the git tag
# and `latest`. `workflow_dispatch` builds from any ref and updates `latest`.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/snek3-trainer
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push CUDA trainer
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/trainer.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=trainer
          cache-to: type=gha,mode=max,scope=trainer
