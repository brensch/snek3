name: trainer-image

# Builds the precompiled trainer-server image and pushes it to GHCR so RunPod
# or any GPU box can pull-and-run with no per-boot build.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'deploy/Dockerfile'
      - 'python/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'pyproject.toml'
      - 'requirements.txt'
      - 'Makefile'
      - '.dockerignore'
      - '.github/workflows/trainer-image.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push trainer
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/snek3:latest
          cache-from: type=gha,scope=trainer
          cache-to: type=gha,mode=max,scope=trainer
