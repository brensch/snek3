name: api-image

# Builds the CPU-only Battlesnake /move API image: the tch/libtorch snek-server
# with the tracked serving checkpoint (checkpoints/serving.safetensors) baked
# in. Everything — viewer build, libtorch install, cargo build — happens inside
# deploy/server.Dockerfile.
#
# Runs when a version tag (v*) is pushed; the image is tagged with the git tag
# and `latest`. `workflow_dispatch` builds from any ref and updates `latest`.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/snek3-api
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push CPU API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/server.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
