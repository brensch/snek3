name: api-image

# Builds the CPU-only Battlesnake /move API image: the tch/libtorch snek-server
# with the tracked serving checkpoint (checkpoints/serving.safetensors) baked
# in. Everything — viewer build, libtorch install, cargo build — happens inside
# deploy/server.Dockerfile.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'deploy/server.Dockerfile'
      - 'crates/**'
      - 'checkpoints/serving.safetensors'
      - 'checkpoints/serving.json'
      - '.dockerignore'
      - '.github/workflows/api-image.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CPU API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/server.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/snek3-api:latest
            ghcr.io/${{ github.repository_owner }}/snek3-api:cpu
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
